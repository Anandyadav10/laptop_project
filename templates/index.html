<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Price Predictor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: gradientShift 8s ease-in-out infinite alternate;
        }

        @keyframes gradientShift {
            0% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            100% { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.8s ease-out forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            0% { filter: drop-shadow(0 0 5px rgba(102, 126, 234, 0.5)); }
            100% { filter: drop-shadow(0 0 15px rgba(118, 75, 162, 0.8)); }
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            position: relative;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }
        .form-group:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .form-group:hover input,
        .form-group:hover select {
            border-color: #667eea;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 42px;
            color: #999;
            transition: color 0.3s ease;
        }

        .form-group:focus-within .input-icon {
            color: #667eea;
        }

        .submit-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 30px auto 0;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
        }

        .result.show {
            opacity: 1;
            transform: scale(1);
        }

        .result.success {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            animation: pulse 2s infinite;
        }

        .result.error {
            background: linear-gradient(45deg, #fa709a, #fee140);
            color: white;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .section-title {
            color: #333;
            font-size: 1.3rem;
            font-weight: 600;
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #e1e5e9;
            display: flex;
            align-items: center;
        }

        .section-title i {
            margin-right: 10px;
            color: #667eea;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
                margin: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-laptop"></i> Laptop Price Predictor</h1>
            <p>Get instant price predictions for laptops based on specifications</p>
        </div>

        <form id="predictionForm">
            <div class="section-title">
                <i class="fas fa-microchip"></i>
                Processor & Performance
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="brand">Brand</label>
                    <select id="brand" name="brand" required>
                        <option value="">Select Brand</option>
                    </select>
                    <i class="fas fa-tag input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="processor_brand">Processor Brand</label>
                    <select id="processor_brand" name="processor_brand" required>
                        <option value="">Select Processor Brand</option>
                    </select>
                    <i class="fas fa-microchip input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="processor_name">Processor Name</label>
                    <select id="processor_name" name="processor_name" required>
                        <option value="">Select Processor</option>
                    </select>
                    <i class="fas fa-cpu input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="processor_gnrtn">Processor Generation</label>
                    <select id="processor_gnrtn" name="processor_gnrtn" required>
                        <option value="">Select Generation</option>
                    </select>
                    <i class="fas fa-layer-group input-icon"></i>
                </div>
            </div>

            <div class="section-title">
                <i class="fas fa-memory"></i>
                Memory & Storage
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="ram_gb">RAM (GB)</label>
                    <input type="number" id="ram_gb" name="ram_gb" min="2" max="64" required>
                    <i class="fas fa-memory input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="ram_type">RAM Type</label>
                    <select id="ram_type" name="ram_type" required>
                        <option value="">Select RAM Type</option>
                    </select>
                    <i class="fas fa-microchip input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="ssd">SSD Storage (GB)</label>
                    <input type="number" id="ssd" name="ssd" min="0" max="2000" value="0">
                    <i class="fas fa-hdd input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="hdd">HDD Storage (GB)</label>
                    <input type="number" id="hdd" name="hdd" min="0" max="2000" value="0">
                    <i class="fas fa-hdd input-icon"></i>
                </div>
            </div>

            <div class="section-title">
                <i class="fas fa-desktop"></i>
                Display & Graphics
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="os">Operating System</label>
                    <select id="os" name="os" required>
                        <option value="">Select OS</option>
                    </select>
                    <i class="fas fa-desktop input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="os_bit">OS Architecture</label>
                    <select id="os_bit" name="os_bit" required>
                        <option value="">Select Architecture</option>
                    </select>
                    <i class="fas fa-cogs input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="graphic_card_gb">Graphics Card (GB)</label>
                    <input type="number" id="graphic_card_gb" name="graphic_card_gb" min="0" max="16" value="0">
                    <i class="fas fa-gamepad input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="touchscreen">Touchscreen</label>
                    <select id="touchscreen" name="touchscreen" required>
                        <option value="">Select Option</option>
                    </select>
                    <i class="fas fa-hand-pointer input-icon"></i>
                </div>
            </div>

            <div class="section-title">
                <i class="fas fa-info-circle"></i>
                Additional Features
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="weight">Weight Category</label>
                    <select id="weight" name="weight" required>
                        <option value="">Select Weight</option>
                    </select>
                    <i class="fas fa-weight input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="warranty">Warranty</label>
                    <select id="warranty" name="warranty" required>
                        <option value="">Select Warranty</option>
                    </select>
                    <i class="fas fa-shield-alt input-icon"></i>
                </div>

                <div class="form-group">
                    <label for="msoffice">Microsoft Office</label>
                    <select id="msoffice" name="msoffice" required>
                        <option value="">Select Option</option>
                    </select>
                    <i class="fas fa-file-word input-icon"></i>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <i class="fas fa-magic"></i> Predict Price
            </button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #666;">Predicting price...</p>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        // Load form options when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadFormOptions();
            
            // Add input animations
            const inputs = document.querySelectorAll('input, select');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'scale(1.02)';
                });
                
                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'scale(1)';
                });
            });
        });

        async function loadFormOptions() {
            try {
                const response = await fetch('/get_options');
                const options = await response.json();
                
                populateSelect('brand', options.brands);
                populateSelect('processor_brand', options.processor_brands);
                populateSelect('processor_name', options.processor_names);
                populateSelect('processor_gnrtn', options.processor_generations);
                populateSelect('ram_type', options.ram_types);
                populateSelect('os', options.operating_systems);
                populateSelect('os_bit', options.os_bits);
                populateSelect('weight', options.weights);
                populateSelect('warranty', options.warranties);
                populateSelect('touchscreen', options.touchscreen_options);
                populateSelect('msoffice', options.msoffice_options);
                
            } catch (error) {
                console.error('Error loading options:', error);
            }
        }

        function populateSelect(selectId, options) {
            const select = document.getElementById(selectId);
            select.innerHTML = '<option value="">Select ' + selectId.replace('_', ' ').toUpperCase() + '</option>';
            
            options.forEach(option => {
                const optionElement = document.createElement('option');
                optionElement.value = option;
                optionElement.textContent = option;
                select.appendChild(optionElement);
            });
        }

        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.querySelector('.submit-btn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            
            // Show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Predicting...';
            loading.classList.add('show');
            result.classList.remove('show');
            
            // Collect form data
            const formData = new FormData(this);
            const data = {};
            for (let [key, value] of formData.entries()) {
                data[key] = value;
            }
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const resultData = await response.json();
                
                if (resultData.success) {
                    result.className = 'result success show';
                    result.innerHTML = `
                        <i class="fas fa-check-circle" style="font-size: 2rem; margin-bottom: 10px;"></i>
                        <div>Predicted Price: ₹${resultData.predicted_price.toLocaleString()}</div>
                        <div style="font-size: 0.9rem; margin-top: 10px; opacity: 0.9;">
                            Based on current market trends and specifications
                        </div>
                    `;
                } else {
                    result.className = 'result error show';
                    result.innerHTML = `
                        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i>
                        <div>Error: ${resultData.error}</div>
                    `;
                }
                
            } catch (error) {
                result.className = 'result error show';
                result.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i>
                    <div>Error: ${error.message}</div>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-magic"></i> Predict Price';
                loading.classList.remove('show');
                
                // Scroll to result
                result.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        });

        // Add smooth scroll behavior
        document.documentElement.style.scrollBehavior = 'smooth';
    </script>
</body>
</html>
